<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TimeBack App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <h1>TimeBack</h1>
    <p class="description">Activa el modo Focus y gana puntos por concentrarte.</p>

    <div class="timer-display" id="timer">25:00</div>
    <button id="startBtn">Iniciar Focus</button>

    <div class="points">
      <p>Puntos: <span id="points">0</span></p>
    </div>

    <div class="plant" id="plant">🌱</div>
  </div>

  <script src="sript.js"></script>
</body>
</html>
